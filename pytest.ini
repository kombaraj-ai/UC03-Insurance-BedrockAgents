[pytest]
# Each of the 4 Lambdas under services/ has its own src/handler.py and
# tests/test_handler.py -- this mirrors their real deployment shape (each is
# an independently zipped, isolated Lambda runtime with no shared package
# namespace). --import-mode=importlib avoids a pytest *collection* error
# from the repeated "test_handler.py" basename.
#
# Run each service's suite as its own pytest invocation/process (as
# `make test` and the commands below do) -- do NOT run
# `pytest services/` across all four in a single process. Because every
# service's business module is literally named `handler`, a single Python
# process importing more than one of them will reuse whichever one it
# imported first via sys.modules, silently testing the wrong code. This
# isn't a test-runner bug to work around; it reflects that these are meant
# to run as separate deployables, never inside one shared interpreter.
addopts = --import-mode=importlib
